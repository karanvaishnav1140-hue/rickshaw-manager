<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rickshaw Business Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6;}
.header{background:#1e40af;color:white;padding:15px;text-align:center;}
.container{padding:15px;}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.05);
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.dashboard div{
background:white;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

input,button,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{background:#16a34a;color:white;border:none;}
.delete{background:red;}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#1e40af;color:white;}
</style>
</head>
<body>

<div class="header">
<h2>🚕 Rickshaw Business Dashboard</h2>
</div>

<div class="container">

<!-- DASHBOARD CARDS -->
<div class="dashboard">
<div id="todayKM">KM: 0</div>
<div id="todayProfit">Profit: ₹0</div>
<div id="fuelLeft">Fuel Left: 0L</div>
<div id="maintenanceMonth">Maintenance: ₹0</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>Vehicle Settings</h3>
<input type="number" id="mileage" placeholder="Mileage (KM per litre)">
<input type="number" id="tank" placeholder="Tank Capacity (litres)">
</div>

<!-- DAILY ENTRY -->
<div class="card">
<h3>Daily Entry</h3>
<input type="date" id="date">
<input type="number" id="km" placeholder="KM">
<input type="number" id="earning" placeholder="Earning ₹">
<input type="number" id="fuel" placeholder="Fuel Filled (litre)">
<button onclick="save()">Save</button>
</div>

<!-- MAINTENANCE -->
<div class="card">
<h3>Add Maintenance</h3>
<select id="maintType">
<option>Service</option>
<option>Oil Change</option>
<option>Tyre</option>
<option>Repair</option>
<option>Other</option>
</select>
<input type="number" id="maintCost" placeholder="Cost ₹">
<button onclick="addMaintenance()">Add Maintenance</button>
</div>

<!-- CHARTS -->
<div class="card">
<h3>Daily Earnings</h3>
<canvas id="earningChart"></canvas>
</div>

<div class="card">
<h3>Daily Profit</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="card">
<h3>KM Activity</h3>
<canvas id="kmChart"></canvas>
</div>

<div class="card">
<h3>Maintenance Chart</h3>
<canvas id="maintChart"></canvas>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("recordsPro")) || [];
let maintenance = JSON.parse(localStorage.getItem("maintenancePro")) || [];

let earningChart,profitChart,kmChart,maintChart;

function save(){
let date=date.value;
let km=parseFloat(document.getElementById("km").value);
let earning=parseFloat(document.getElementById("earning").value);
let fuel=parseFloat(document.getElementById("fuel").value);

if(!date||isNaN(km)||isNaN(earning)||isNaN(fuel)){
alert("Fill properly");
return;
}

let profit=earning-(fuel*100); // approx fuel cost calc

records.push({date,km,earning,fuel,profit});
localStorage.setItem("recordsPro",JSON.stringify(records));
display();
}

function addMaintenance(){
let type=document.getElementById("maintType").value;
let cost=parseFloat(document.getElementById("maintCost").value);

maintenance.push({type,cost,date:new Date().toISOString().split("T")[0]});
localStorage.setItem("maintenancePro",JSON.stringify(maintenance));
display();
}

function display(){

let today=new Date().toISOString().split("T")[0];
let todayData=records.filter(r=>r.date==today);

let totalKM=todayData.reduce((a,b)=>a+b.km,0);
let totalProfit=todayData.reduce((a,b)=>a+b.profit,0);

document.getElementById("todayKM").innerText="KM: "+totalKM;
document.getElementById("todayProfit").innerText="Profit: ₹"+totalProfit;

let mileage=parseFloat(document.getElementById("mileage").value)||10;
let tank=parseFloat(document.getElementById("tank").value)||30;

let totalFuelUsed=records.reduce((a,b)=>a+b.fuel,0);
let fuelLeft=tank-totalFuelUsed;

document.getElementById("fuelLeft").innerText="Fuel Left: "+fuelLeft.toFixed(2)+"L";

let maintMonth=maintenance.reduce((a,b)=>a+b.cost,0);
document.getElementById("maintenanceMonth").innerText="Maintenance: ₹"+maintMonth;

drawCharts();
}

function drawCharts(){

let labels=records.map(r=>r.date);

if(earningChart) earningChart.destroy();
earningChart=new Chart(document.getElementById("earningChart"),{
type:'bar',
data:{labels:labels,datasets:[{label:"Earnings",data:records.map(r=>r.earning)}]}
});

if(profitChart) profitChart.destroy();
profitChart=new Chart(document.getElementById("profitChart"),{
type:'line',
data:{labels:labels,datasets:[{label:"Profit",data:records.map(r=>r.profit)}]}
});

if(kmChart) kmChart.destroy();
kmChart=new Chart(document.getElementById("kmChart"),{
type:'bar',
data:{labels:labels,datasets:[{label:"KM",data:records.map(r=>r.km)}]}
});

if(maintChart) maintChart.destroy();
maintChart=new Chart(document.getElementById("maintChart"),{
type:'pie',
data:{
labels:maintenance.map(m=>m.type),
datasets:[{data:maintenance.map(m=>m.cost)}]
}
});
}

display();

</script>
</body>
</html>
