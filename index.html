<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rickshaw WorkSmart</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f1b2d;color:white;}
.card{background:#18273f;padding:15px;margin:15px;border-radius:12px;}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#2b3c5a;color:white;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#00c853;color:white;}
.summary{display:flex;flex-wrap:wrap;justify-content:space-between;}
.small-card{background:#1e3354;padding:10px;margin:5px 0;border-radius:8px;width:48%;text-align:center;}
.navbar{position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:10px 0;}
.navbar div{color:white;font-size:14px;}
.hidden{display:none;}
.editBtn{background:orange;}
.deleteBtn{background:red;}
</style>
</head>

<body>

<div id="loginScreen" class="card">
<h2>Rickshaw WorkSmart</h2>
<input type="text" id="userId" placeholder="Enter Your ID">
<button onclick="login()">Login</button>
</div>

<!-- DAILY SCREEN -->
<div id="dailyScreen" class="hidden">

<div class="card">
<h3>CNG Settings</h3>
<input type="number" id="mileage" placeholder="Mileage (KM per Liter)">
<input type="number" id="tankCapacity" value="4" placeholder="Tank Capacity (Liter)">
</div>

<div class="card">
<h3>Daily Entry</h3>
<input type="date" id="date">
<input type="number" id="km" placeholder="KM Driven">
<input type="number" id="earning" placeholder="Earning ₹">
<input type="number" id="fuel" placeholder="Fuel Filled (Liter)">
<button onclick="saveEntry()">Save Entry</button>
</div>

<div class="card">
<h3>Summary</h3>
<div class="summary">
<div class="small-card">Total KM<br><span id="totalKM">0</span></div>
<div class="small-card">Total ₹<br><span id="totalEarning">0</span></div>
<div class="small-card">Fuel Used<br><span id="totalFuel">0</span></div>
<div class="small-card">Fuel Expense<br>₹<span id="fuelCost">0</span></div>
<div class="small-card">Maintenance<br>₹<span id="maintCostTotal">0</span></div>
<div class="small-card">Net Profit<br>₹<span id="netProfit">0</span></div>
<div class="small-card">KM Left<br><span id="kmLeft">0</span></div>
</div>
</div>

<div class="card">
<h3>Entries</h3>
<div id="entryList"></div>
</div>

</div>

<!-- MONTHLY -->
<div id="monthlyScreen" class="hidden">
<div class="card">
<h3>Monthly Report</h3>
<input type="month" id="monthFilter" onchange="filterMonth()">
<div id="monthlyData"></div>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportExcel()">Export Excel</button>
</div>
</div>

<!-- MAINTENANCE -->
<div id="maintScreen" class="hidden">
<div class="card">
<h3>Add Maintenance</h3>
<input type="date" id="maintDate">
<input type="text" id="maintNote" placeholder="Note">
<input type="number" id="maintCost" placeholder="Cost ₹">
<button onclick="addMaintenance()">Save Maintenance</button>
</div>

<div class="card">
<h3>Maintenance List</h3>
<div id="maintList"></div>
</div>
</div>

<!-- CHART -->
<div id="chartScreen" class="hidden">
<div class="card">
<h3>Business Chart</h3>
<canvas id="myChart"></canvas>
</div>
</div>

<div class="navbar hidden" id="navbar">
<div onclick="showScreen('daily')">📅 Daily</div>
<div onclick="showScreen('monthly')">📊 Monthly</div>
<div onclick="showScreen('maint')">🔧 Maint.</div>
<div onclick="showScreen('chart')">📈 Chart</div>
</div>

<script>
let currentUser="";
let data=[];
let maintenance=[];
let editIndex=-1;
let chart;

function login(){
if(!userId.value)return alert("Enter ID");
currentUser=userId.value;
localStorage.setItem("currentUser",currentUser);
loginScreen.classList.add("hidden");
dailyScreen.classList.remove("hidden");
navbar.classList.remove("hidden");
loadData();
}

function showScreen(s){
["daily","monthly","maint","chart"].forEach(x=>document.getElementById(x+"Screen").classList.add("hidden"));
document.getElementById(s+"Screen").classList.remove("hidden");
if(s==="chart") drawChart();
}

function saveEntry(){
const entry={
date:date.value,
km:Number(km.value),
earning:Number(earning.value),
fuel:Number(fuel.value||0)
};
if(!entry.date)return alert("Enter date");

if(editIndex===-1) data.push(entry);
else{data[editIndex]=entry;editIndex=-1;}

saveData();
clearForm();
render();
}

function editEntry(i){
const e=data[i];
date.value=e.date;
km.value=e.km;
earning.value=e.earning;
fuel.value=e.fuel;
editIndex=i;
}

function deleteEntry(i){
data.splice(i,1);
saveData();
render();
}

function render(){
entryList.innerHTML="";
let totalKM=0,totalEarning=0,totalFuel=0;
data.forEach((e,i)=>{
totalKM+=e.km;
totalEarning+=e.earning;
totalFuel+=e.fuel;
entryList.innerHTML+=`
<div style="background:#23395d;padding:8px;margin:5px;border-radius:8px">
${e.date} | ${e.km} KM | ₹${e.earning}
<br>
<button class="editBtn" onclick="editEntry(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button>
</div>`;
});

let maintTotal=maintenance.reduce((sum,m)=>sum+m.cost,0);

totalKMSpan=document.getElementById("totalKM").innerText=totalKM;
totalEarning.innerText=totalEarning;
totalFuel.innerText=totalFuel;

let fuelExpense=totalFuel*80;
fuelCost.innerText=fuelExpense;
maintCostTotal.innerText=maintTotal;

netProfit.innerText=totalEarning-fuelExpense-maintTotal;

let remaining=(tankCapacity.value||4)-totalFuel;
kmLeft.innerText=Math.max(remaining*(mileage.value||0),0);
}

function addMaintenance(){
const m={
date:maintDate.value,
note:maintNote.value,
cost:Number(maintCost.value||0)
};
maintenance.push(m);
saveData();
renderMaintenance();
render();
}

function renderMaintenance(){
maintList.innerHTML="";
maintenance.forEach(m=>{
maintList.innerHTML+=`<div>${m.date} | ${m.note} | ₹${m.cost}</div>`;
});
}

function saveData(){
localStorage.setItem(currentUser+"_data",JSON.stringify(data));
localStorage.setItem(currentUser+"_maint",JSON.stringify(maintenance));
}

function loadData(){
data=JSON.parse(localStorage.getItem(currentUser+"_data"))||[];
maintenance=JSON.parse(localStorage.getItem(currentUser+"_maint"))||[];
render();
renderMaintenance();
}

function drawChart(){
let totalEarning=data.reduce((s,e)=>s+e.earning,0);
let totalFuel=data.reduce((s,e)=>s+e.fuel,0)*80;
let maintTotal=maintenance.reduce((s,m)=>s+m.cost,0);
let profit=totalEarning-totalFuel-maintTotal;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("myChart"),{
type:"bar",
data:{
labels:["Earning","Fuel Expense","Maintenance","Profit"],
datasets:[{
data:[totalEarning,totalFuel,maintTotal,profit],
backgroundColor:["#00e676","#ff5252","#ffab00","#2979ff"]
}]
}
});
}

function clearForm(){
date.value="";
km.value="";
earning.value="";
fuel.value="";
}

function filterMonth(){
let month=monthFilter.value;
let total=0;
data.forEach(e=>{if(e.date.startsWith(month))total+=e.earning;});
monthlyData.innerHTML="Total Earning: ₹"+total;
}
</script>

</body>
</html>
