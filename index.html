<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rickshaw Business Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url('auto-bg.png') no-repeat center center fixed;
background-size:cover;
color:white;
}

/* Overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* Header */
.header{
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* Screens */
.screen{
display:none;
padding:15px;
}

.active{
display:block;
}

/* Card */
.card{
background:rgba(255,255,255,0.1);
padding:15px;
margin-bottom:15px;
border-radius:12px;
backdrop-filter:blur(10px);
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

.delete{
background:red;
}

/* Bottom Nav */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom-nav div{
text-align:center;
font-size:12px;
color:white;
}

.bottom-nav i{
font-size:20px;
display:block;
}

/* Fade animation */
.fade-in{
animation:fade 1s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

canvas{
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header fade-in">
🚕 Rickshaw Business Pro
</div>

<!-- DAILY SCREEN -->
<div id="daily" class="screen active fade-in">

<div class="card">
<h3>Daily Entry</h3>
<input type="date" id="date">
<input type="number" id="km" placeholder="KM">
<input type="number" id="earning" placeholder="Earning ₹">
<input type="number" id="fuel" placeholder="Fuel ₹">
<button onclick="save()">Save</button>
</div>

<div class="card">
<h3>Daily Activity Chart</h3>
<canvas id="dailyChart"></canvas>
</div>

</div>

<!-- MONTHLY SCREEN -->
<div id="monthly" class="screen">

<div class="card">
<h3>Monthly Filter</h3>
<input type="month" id="monthFilter" onchange="display()">
<button onclick="exportCSV()">Export Excel</button>
</div>

<div class="card">
<h3>Monthly Summary</h3>
<p id="summary"></p>
</div>

</div>

<!-- MAINTENANCE -->
<div id="maintenance" class="screen">

<div class="card">
<h3>Add Maintenance</h3>
<select id="maintType">
<option>Service</option>
<option>Oil Change</option>
<option>Tyre</option>
<option>Repair</option>
</select>
<input type="number" id="maintCost" placeholder="Cost ₹">
<button onclick="addMaintenance()">Add</button>
</div>

<div class="card">
<canvas id="maintChart"></canvas>
</div>

</div>

<!-- CHART SCREEN -->
<div id="charts" class="screen">
<div class="card">
<h3>Profit Chart</h3>
<canvas id="profitChart"></canvas>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<div onclick="openScreen('daily')">
<i>📅</i>Daily
</div>
<div onclick="openScreen('monthly')">
<i>📊</i>Monthly
</div>
<div onclick="openScreen('maintenance')">
<i>🔧</i>Maint.
</div>
<div onclick="openScreen('charts')">
<i>📈</i>Charts
</div>
</div>

<script>

let records=JSON.parse(localStorage.getItem("recordsV3"))||[];
let maintenance=JSON.parse(localStorage.getItem("maintV3"))||[];

let dailyChart,profitChart,maintChart;

function openScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
display();
}

function save(){
let date=document.getElementById("date").value;
let km=parseFloat(document.getElementById("km").value);
let earning=parseFloat(document.getElementById("earning").value);
let fuel=parseFloat(document.getElementById("fuel").value);

if(!date||isNaN(km)||isNaN(earning)||isNaN(fuel)){
alert("Fill properly");
return;
}

let profit=earning-fuel;

records.push({date,km,earning,fuel,profit});
localStorage.setItem("recordsV3",JSON.stringify(records));
display();
}

function addMaintenance(){
let type=document.getElementById("maintType").value;
let cost=parseFloat(document.getElementById("maintCost").value);

maintenance.push({type,cost});
localStorage.setItem("maintV3",JSON.stringify(maintenance));
display();
}

function display(){

let month=document.getElementById("monthFilter")?.value;
let filtered=records;

if(month){
filtered=records.filter(r=>r.date.startsWith(month));
}

let total=filtered.reduce((a,b)=>a+b.profit,0);
if(document.getElementById("summary"))
document.getElementById("summary").innerHTML="Net Profit ₹"+total;

drawCharts(filtered);
}

function drawCharts(data){

if(dailyChart) dailyChart.destroy();
dailyChart=new Chart(document.getElementById("dailyChart"),{
type:'bar',
data:{labels:data.map(r=>r.date),
datasets:[{label:'Earnings',data:data.map(r=>r.earning)}]}
});

if(profitChart) profitChart.destroy();
profitChart=new Chart(document.getElementById("profitChart"),{
type:'line',
data:{labels:data.map(r=>r.date),
datasets:[{label:'Profit',data:data.map(r=>r.profit)}]}
});

if(maintChart) maintChart.destroy();
maintChart=new Chart(document.getElementById("maintChart"),{
type:'pie',
data:{
labels:maintenance.map(m=>m.type),
datasets:[{data:maintenance.map(m=>m.cost)}]
}
});
}

function exportCSV(){
let csv="Date,KM,Earning,Fuel,Profit\n";
records.forEach(r=>{
csv+=`${r.date},${r.km},${r.earning},${r.fuel},${r.profit}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="rickshaw_data.csv";
a.click();
}

display();

</script>

</body>
</html>
