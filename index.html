<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rickshaw Tracker Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.header{background:#007bff;color:white;padding:15px;text-align:center;}
.container{padding:15px;}
.box{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select,button{padding:10px;margin:5px 0;width:100%;border-radius:5px;border:1px solid #ccc;}
button{background:#28a745;color:white;border:none;}
.delete{background:red;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#007bff;color:white;}
</style>
</head>
<body>

<div class="header">
<h2>🚕 Rickshaw Tracker Pro</h2>
</div>

<div class="container">

<div class="box">
<input type="date" id="date">
<input type="number" id="km" placeholder="KM">
<input type="number" id="earning" placeholder="Earning ₹">
<input type="number" id="fuel" placeholder="Fuel ₹">
<button onclick="save()">Save</button>
</div>

<div class="box">
<h3>Monthly Filter</h3>
<input type="month" id="monthFilter" onchange="display()">
<button onclick="exportCSV()">Export to Excel</button>
</div>

<div class="box">
<h3>Monthly Summary</h3>
<p id="monthly"></p>
</div>

<div class="box">
<h3>Earning Chart</h3>
<canvas id="earningChart"></canvas>
</div>

<div class="box">
<h3>Profit Chart</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="box">
<table>
<thead>
<tr>
<th>Date</th>
<th>KM</th>
<th>Earning</th>
<th>Fuel</th>
<th>Profit</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("rickshawPro")) || [];
let earningChart, profitChart;

function save(){
let date = document.getElementById("date").value;
let km = parseFloat(document.getElementById("km").value);
let earning = parseFloat(document.getElementById("earning").value);
let fuel = parseFloat(document.getElementById("fuel").value);

if(!date || isNaN(km) || isNaN(earning) || isNaN(fuel)){
alert("Please fill all fields properly");
return;
}

let profit = earning - fuel;

records.push({date,km,earning,fuel,profit});
localStorage.setItem("rickshawPro", JSON.stringify(records));

clearForm();
display();
}

function clearForm(){
document.getElementById("date").value="";
document.getElementById("km").value="";
document.getElementById("earning").value="";
document.getElementById("fuel").value="";
}

function display(){

let tbody = document.getElementById("data");
tbody.innerHTML="";

let month = document.getElementById("monthFilter").value;
let filtered = records;

if(month){
filtered = records.filter(r => r.date.startsWith(month));
}

let totalE=0,totalF=0,totalKM=0;

filtered.forEach((r,index)=>{

totalE+=r.earning;
totalF+=r.fuel;
totalKM+=r.km;

tbody.innerHTML+=`
<tr>
<td>${r.date}</td>
<td>${r.km}</td>
<td>₹${r.earning}</td>
<td>₹${r.fuel}</td>
<td>₹${r.profit}</td>
<td>
<button onclick="editRecord(${records.indexOf(r)})">Edit</button>
<button onclick="deleteRecord(${records.indexOf(r)})" class="delete">Delete</button>
</td>
</tr>`;
});

document.getElementById("monthly").innerHTML =
"Total KM: "+totalKM+
"<br>Total Earning: ₹"+totalE+
"<br>Total Fuel: ₹"+totalF+
"<br><b>Net Profit: ₹"+(totalE-totalF)+"</b>";

drawCharts(filtered);
}

function deleteRecord(index){
if(confirm("Delete this entry?")){
records.splice(index,1);
localStorage.setItem("rickshawPro", JSON.stringify(records));
display();
}
}

function editRecord(index){
let r = records[index];

document.getElementById("date").value = r.date;
document.getElementById("km").value = r.km;
document.getElementById("earning").value = r.earning;
document.getElementById("fuel").value = r.fuel;

records.splice(index,1);
localStorage.setItem("rickshawPro", JSON.stringify(records));
display();
}

function drawCharts(data){

let labels = data.map(r=>r.date);
let earnings = data.map(r=>r.earning);
let profits = data.map(r=>r.profit);

if(earningChart) earningChart.destroy();
if(profitChart) profitChart.destroy();

earningChart = new Chart(document.getElementById("earningChart"),{
type:'bar',
data:{labels:labels,datasets:[{label:'Earnings ₹',data:earnings}]}
});

profitChart = new Chart(document.getElementById("profitChart"),{
type:'line',
data:{labels:labels,datasets:[{label:'Profit ₹',data:profits}]}
});
}

function exportCSV(){

let csv="Date,KM,Earning,Fuel,Profit\n";

records.forEach(r=>{
csv+=`${r.date},${r.km},${r.earning},${r.fuel},${r.profit}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let url = URL.createObjectURL(blob);
let a = document.createElement("a");
a.href = url;
a.download = "rickshaw_data.csv";
a.click();
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

display();

</script>
</body>
</html>
